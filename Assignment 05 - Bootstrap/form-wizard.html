<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Bootstrap Form Wizard</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="alertPlaceholder"></div>
	<div class="container mt-5">
		<h2 class="mb-4">User Registration Wizard</h2>

		<div id="alert-area"></div>
        <div class="progress mb-4">
	        <div id="wizardProgress" class="progress-bar" style="width: 33%"></div>
        </div>
		<div id="wizard">
            <ul class="nav nav-tabs mb-4" id="wizardTabs">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#step1">
                        Step 1
                    </button>
                </li>

                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#step2">
                        Step 2
                    </button>
                </li>

                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#step3">
                        Step 3
                    </button>
                </li>

            </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="step1">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Personal Information</h5>

                                <input class="form-control mb-3" id="name" placeholder="Full Name">
                                <input class="form-control mb-3" id="email" placeholder="Email">

                                <button class="btn btn-primary" onclick="if(validateStep1()) nextStep(2)">Next</button>
                            </div>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="step2">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Account Details</h5>

                                <input class="form-control mb-3" id="username" placeholder="Username">
                                <input type="password" class="form-control mb-3" id="password" placeholder="Password">

                                <button class="btn btn-secondary" onclick="previousStep(1)">Back</button>
                                <button class="btn btn-primary" onclick="if(validateStep2()) nextStep(3)">Next</button>
                            </div>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="step3">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Confirmation</h5>
                                <p>Please confirm your information</p>

                                <button class="btn btn-secondary" onclick="previousStep(2)">Back</button>
                                <button class="btn btn-success" type="button" onclick="submitForm()">Submit</button>                            </div>
                        </div>
                    </div>
                </div>
        </div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

	<script src="js/wizard.js"></script>
</body>
</html>
